name: Release Windows

# Build and publish the Windows installer to a GitHub Release whenever a version
# tag (e.g. v0.1.0) is pushed. electron-updater then serves updates from there.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Make the git tag the single source of truth for the version: a tag
      # `v1.2.3` sets the package version to `1.2.3` before building, so the
      # installer and the auto-update metadata always match the release tag.
      - name: Align version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      - name: Build application
        run: npm run build

      # Create exactly one release up front so electron-builder uploads INTO it
      # instead of racing to create the release per-artifact (which produced two
      # drafts — one with the .exe/.yml, one with the .blockmap).
      - name: Ensure a single release exists
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --generate-notes

      - name: Build & upload installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis --publish always

      # Flip the draft to a published release so electron-updater (which only
      # sees published releases) can find latest.yml and offer the update.
      - name: Publish the release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest
